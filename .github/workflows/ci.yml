# Docs CI Pipeline
# Validates Mintlify documentation content
# Critical path: validate-content → ci-passed (branch protection)

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "docs.json"
      - "snippets/**"
      - "api-reference/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "docs.json"
      - "snippets/**"
      - "api-reference/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-content:
    name: Validate Documentation Content
    runs-on: ${{ vars.GHA_HOSTED_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check MDX files have frontmatter
        run: |
          echo "Checking MDX files for required frontmatter..."
          MISSING=0
          for file in $(find . -name "*.mdx" -not -path "./node_modules/*" -not -path "./internal-notes/*"); do
            if ! head -1 "$file" | grep -q "^---"; then
              echo "❌ Missing frontmatter: $file"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "⚠️ Found $MISSING files without proper frontmatter"
          else
            echo "✅ All MDX files have frontmatter"
          fi
      
      - name: Check docs.json is valid JSON
        run: |
          if [ -f "docs.json" ]; then
            python3 -m json.tool docs.json > /dev/null && echo "✅ docs.json is valid JSON"
          else
            echo "⚠️ docs.json not found"
          fi
      
      - name: Validate frontmatter (if script exists)
        run: npm run validate:frontmatter --if-present
      
      - name: Check internal links (if script exists)
        run: npm run validate:links --if-present

      - name: Check navigation references (if script exists)
        run: npm run validate:navigation --if-present

  check-brand-guidelines:
    name: Check Brand Guidelines
    runs-on: ${{ vars.GHA_HOSTED_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Check for brand violations
        run: |
          echo "Checking brand guidelines..."
          
          # Check for uppercase "Kombify" (should be lowercase "kombify")
          VIOLATIONS=$(grep -r "Kombify" --include="*.mdx" --include="*.md" . \
            | grep -v "node_modules" \
            | grep -vE "^[^:]+:[[:space:]]*(subgraph|style)[[:space:]]+Kombify[A-Za-z]*" \
            | wc -l || echo "0")
          if [ "$VIOLATIONS" -gt "0" ]; then
            echo "⚠️ Found $VIOLATIONS uses of 'Kombify' - should be lowercase 'kombify'"
            grep -r "Kombify" --include="*.mdx" --include="*.md" . \
              | grep -v "node_modules" \
              | grep -vE "^[^:]+:[[:space:]]*(subgraph|style)[[:space:]]+Kombify[A-Za-z]*" \
              | head -10
            exit 1
          else
            echo "✅ Brand guidelines followed"
          fi

  # Final status check for branch protection
  ci-passed:
    name: ✅ CI Passed
    needs: [validate-content, check-brand-guidelines]
    runs-on: ${{ vars.GHA_HOSTED_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.validate-content.result }}" != "success" ]; then
            echo "❌ Content validation had issues"
            exit 1
          fi
          if [ "${{ needs.check-brand-guidelines.result }}" != "success" ]; then
            echo "❌ Brand guideline validation had issues"
            exit 1
          fi
          echo "✅ Documentation CI complete"
