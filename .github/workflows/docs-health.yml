name: Weekly Docs Health Check
# Health check job: validates docs structure & navigation

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ${{ vars.GHA_HOSTED_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: npm ci

      - name: Validate frontmatter
        run: npm run validate:frontmatter

      - name: Check internal links
        run: npm run validate:links

      - name: Check orphaned pages
        run: npm run validate:orphans

      - name: Check navigation coverage
        run: npm run validate:navigation
