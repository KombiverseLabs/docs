name: Docs Validation
# PR validation job: ensures MDX & metadata are valid before merge

on:
  pull_request:
    branches: [main]
    paths:
      - '**.mdx'
      - 'docs.json'
      - 'snippets/**'
      - 'api-reference/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ vars.GHA_HOSTED_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - run: npm ci

      - name: Validate frontmatter
        run: npm run validate:frontmatter

      - name: Check internal links
        run: npm run validate:links

      - name: Check orphaned pages
        run: npm run validate:orphans
        continue-on-error: true

      - name: Check navigation coverage
        run: npm run validate:navigation
